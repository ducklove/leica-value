  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="240" cy="180" r="200" fill="url(#glow)"/>
  <circle cx="240" cy="180" r="110" fill="#d50019"/>
  <text x="240" y="200" text-anchor="middle" font-family="Noto Sans, Arial, sans-serif" font-size="88" font-weight="700" fill="#fff7f2">L</text>
  <text x="420" y="238" font-family="Noto Sans, Arial, sans-serif" font-size="74" font-weight="700" fill="#fff7f2">Leica Used Value Tracker</text>
  <text x="420" y="304" font-family="Noto Sans, Arial, sans-serif" font-size="28" font-weight="500" fill="#f5d8dd">eBay current listings benchmark with shipping-inclusive USD prices</text>
  <text x="420" y="380" font-family="Noto Sans, Arial, sans-serif" font-size="24" font-weight="500" fill="#d9b0b8">M, Q, SL, film bodies, M lenses, and SL lenses</text>
