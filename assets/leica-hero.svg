<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Leica Used Value Tracker</title>
  <desc id="desc">Leica used value tracker brand card</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#190f12"/>
      <stop offset="55%" stop-color="#0d0c0d"/>
      <stop offset="100%" stop-color="#2b1217"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.2" r="0.8">
      <stop offset="0%" stop-color="#d50019" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d50019" stop-opacity="0"/>
